name: Build AC6Recomp Windows RelWithDebInfo

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch, tag or commit to build
        required: true
        default: dev-test
        type: string

      openlist_path:
        description: Path of the ISO on OpenList
        required: true
        default: Ace Combat 6.iso
        type: string

      iso_sha256:
        description: SHA-256 of the ISO
        required: true
        default: 204c5e645d79da8776699c12f17bd069f869fbdb10ae79015d1a0ef2b743c98c
        type: string

permissions:
  contents: read

concurrency:
  group: ac6recomp-win-relwithdebinfo-${{ inputs.source_ref }}
  cancel-in-progress: false

jobs:
  build:
    name: win-amd64-relwithdebinfo

    runs-on:
      - windows-latest

    timeout-minutes: 240

    defaults:
      run:
        shell: pwsh

    env:
      OPENLIST_PATH: ${{ inputs.openlist_path }}
      EXPECTED_ISO_SHA256: ${{ inputs.iso_sha256 }}

      CMAKE_PRESET: win-amd64-relwithdebinfo
      PRIVATE_INPUT_DIR: private-input
      ISO_LOCAL_PATH: private-input/ac6.iso
      ASSETS_DIR: assets
      ARTIFACT_DIR: artifact/AC6Recomp

      # Pin xdvdfs-cli to a known-good release asset so builds stay
      # reproducible and don't silently pick up breaking CLI changes.
      XDVDFS_RELEASE_URL: https://github.com/antangelo/xdvdfs/releases/download/v0.8.3/xdvdfs-windows-1cc850bf1b3487fad7ec7c9eed01d83e8fc75ba4.zip

      # sccache config: local disk cache, capped size so it doesn't grow
      # unbounded across cache restores.
      SCCACHE_DIR: ${{ github.workspace }}\.sccache
      SCCACHE_CACHE_SIZE: 2G
      CMAKE_C_COMPILER_LAUNCHER: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache

    steps:
      # ------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 1
          submodules: false
          clean: true

      # ------------------------------------------------------------
      # 2. Verify workflow inputs
      # ------------------------------------------------------------

      - name: Verify configuration
        run: |
          $ErrorActionPreference = 'Stop'

          if ([string]::IsNullOrWhiteSpace($env:OPENLIST_PATH)) {
              throw "OpenList path was not provided."
          }

          if ([string]::IsNullOrWhiteSpace(
              $env:EXPECTED_ISO_SHA256
          )) {
              throw "ISO SHA-256 was not provided."
          }

          $normalizedHash = (
              $env:EXPECTED_ISO_SHA256 -replace '\s', ''
          )

          if ($normalizedHash -notmatch '^[0-9a-fA-F]{64}$') {
              throw @"
          ISO SHA-256 must contain exactly 64 hexadecimal characters.
          "@
          }

          Write-Host "Source ref    : ${{ inputs.source_ref }}"
          Write-Host "CMake preset  : $env:CMAKE_PRESET"
          Write-Host "OpenList path : $env:OPENLIST_PATH"
          Write-Host "ISO SHA-256   : $normalizedHash"

      # ------------------------------------------------------------
      # 3. Authenticate with OpenList and resolve the download URL
      # ------------------------------------------------------------

      - name: Resolve ISO download URL via OpenList
        env:
          OPENLIST_SERVER: ${{ secrets.OPENLIST_SERVER }}
          OPENLIST_USERNAME: ${{ secrets.OPENLIST_USERNAME }}
          OPENLIST_PASSWORD: ${{ secrets.OPENLIST_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'

          if ([string]::IsNullOrWhiteSpace($env:OPENLIST_SERVER)) {
              throw "OPENLIST_SERVER secret is not set."
          }

          if ([string]::IsNullOrWhiteSpace($env:OPENLIST_USERNAME)) {
              throw "OPENLIST_USERNAME secret is not set."
          }

          if ([string]::IsNullOrWhiteSpace($env:OPENLIST_PASSWORD)) {
              throw "OPENLIST_PASSWORD secret is not set."
          }

          $server = $env:OPENLIST_SERVER.TrimEnd('/')

          # --- Log in and obtain a JWT token ---
          $loginBody = @{
              username = $env:OPENLIST_USERNAME
              password = $env:OPENLIST_PASSWORD
          } | ConvertTo-Json

          $loginResponse = Invoke-RestMethod `
              -Uri "$server/api/auth/login" `
              -Method Post `
              -ContentType 'application/json' `
              -Body $loginBody

          if ($loginResponse.code -ne 200) {
              throw "OpenList login failed: $($loginResponse.message)"
          }

          $token = $loginResponse.data.token

          if ([string]::IsNullOrWhiteSpace($token)) {
              throw "OpenList login did not return a token."
          }

          # Prevent the token from ever showing up in the run log.
          Write-Host "::add-mask::$token"

          # --- Resolve the file's raw_url via fs/get ---
          $fsGetBody = @{
              path     = $env:OPENLIST_PATH
              password = ''
          } | ConvertTo-Json

          $fsGetResponse = Invoke-RestMethod `
              -Uri "$server/api/fs/get" `
              -Method Post `
              -ContentType 'application/json' `
              -Headers @{ Authorization = $token } `
              -Body $fsGetBody

          if ($fsGetResponse.code -ne 200) {
              throw "OpenList fs/get failed: $($fsGetResponse.message)"
          }

          $rawUrl = $fsGetResponse.data.raw_url

          if ([string]::IsNullOrWhiteSpace($rawUrl)) {
              throw "OpenList did not return a raw_url for the requested path."
          }

          if ($rawUrl -notmatch '^https://') {
              throw "Resolved raw_url does not use HTTPS."
          }

          # raw_url can carry a signed/temporary token in its query string,
          # so mask it too before it's ever written to a log line.
          Write-Host "::add-mask::$rawUrl"

          "RESOLVED_ISO_URL=$rawUrl" |
              Out-File `
                  -FilePath $env:GITHUB_ENV `
                  -Append `
                  -Encoding utf8

          Write-Host "Resolved ISO download URL from OpenList."

      # ------------------------------------------------------------
      # 4. Cache Cargo registry (speeds up xdvdfs-cli / sccache installs)
      # ------------------------------------------------------------

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\bin
          key: cargo-win-sccache

      # ------------------------------------------------------------
      # 5. Install xdvdfs-cli
      # ------------------------------------------------------------

      - name: Install xdvdfs-cli
        run: |
          $ErrorActionPreference = 'Stop'

          if (Get-Command xdvdfs -ErrorAction SilentlyContinue) {
              Write-Host "xdvdfs already present, skipping install."
              xdvdfs --version
              exit 0
          }

          $installDir = Join-Path $env:RUNNER_TEMP 'xdvdfs-cli'
          $zipPath = Join-Path $env:RUNNER_TEMP 'xdvdfs-cli.zip'

          Write-Host "Downloading xdvdfs-cli from $env:XDVDFS_RELEASE_URL ..."

          curl.exe `
              --fail `
              --location `
              --retry 5 `
              --retry-all-errors `
              --retry-delay 5 `
              --connect-timeout 30 `
              --max-time 300 `
              --output "$zipPath" `
              "$env:XDVDFS_RELEASE_URL"

          if ($LASTEXITCODE -ne 0) {
              throw "xdvdfs-cli download failed with exit code $LASTEXITCODE."
          }

          if (Test-Path -LiteralPath $installDir) {
              Remove-Item -LiteralPath $installDir -Recurse -Force
          }

          Expand-Archive `
              -LiteralPath $zipPath `
              -DestinationPath $installDir `
              -Force

          $exe = Get-ChildItem `
              -LiteralPath $installDir `
              -Recurse `
              -File `
              -Filter 'xdvdfs.exe' |
              Select-Object -First 1

          if (-not $exe) {
              throw "xdvdfs.exe was not found inside the downloaded release archive."
          }

          # Persist PATH change for later steps ...
          Add-Content -Path $env:GITHUB_PATH -Value $exe.DirectoryName

          # ... and make it usable for the remainder of this step too.
          $env:PATH = "$($exe.DirectoryName);$env:PATH"

          xdvdfs --version

          if ($LASTEXITCODE -ne 0) {
              throw "xdvdfs was installed but failed to run."
          }

      # ------------------------------------------------------------
      # 6. Install sccache (compiler cache, cuts rebuild time)
      # ------------------------------------------------------------

      - name: Install sccache
        run: |
          $ErrorActionPreference = 'Stop'

          if (Get-Command sccache -ErrorAction SilentlyContinue) {
              Write-Host "sccache already present, skipping install."
              sccache --version
              exit 0
          }

          cargo install sccache --locked

          if ($LASTEXITCODE -ne 0) {
              throw "Failed to install sccache via cargo."
          }

      - name: Restore sccache cache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          # Keyed on preset + commit so a re-run of the *same* commit gets a
          # full hit, while a new commit still gets partial hits on unchanged
          # object files. Falls back to the most recent cache for the preset
          # via restore-keys.
          key: sccache-${{ env.CMAKE_PRESET }}-${{ github.sha }}
          restore-keys: |
            sccache-${{ env.CMAKE_PRESET }}-

      # ------------------------------------------------------------
      # 7. Verify runner toolchain
      # ------------------------------------------------------------

      - name: Verify toolchain
        run: |
          $ErrorActionPreference = 'Stop'

          $requiredCommands = @(
              'git',
              'cmake',
              'ninja',
              'clang',
              'clang++',
              'xdvdfs',
              'sccache',
              'curl.exe'
          )

          foreach ($command in $requiredCommands) {
              if (-not (
                  Get-Command $command -ErrorAction SilentlyContinue
              )) {
                  throw "Required command is missing: $command"
              }
          }

          git --version
          cmake --version
          ninja --version
          clang --version
          clang++ --version
          xdvdfs --version
          sccache --version
          curl.exe --version

          $cmakeVersionLine = (
              cmake --version |
              Select-Object -First 1
          )

          if ($cmakeVersionLine -notmatch 'cmake version (\d+)\.(\d+)') {
              throw "Unable to parse CMake version: $cmakeVersionLine"
          }

          $major = [int]$Matches[1]
          $minor = [int]$Matches[2]

          if (
              $major -lt 3 -or
              ($major -eq 3 -and $minor -lt 25)
          ) {
              throw "CMake 3.25 or newer is required."
          }

      # ------------------------------------------------------------
      # 8. Clean previous workspace data
      # ------------------------------------------------------------

      - name: Clean workspace
        run: |
          $ErrorActionPreference = 'Stop'

          $directories = @(
              $env:PRIVATE_INPUT_DIR,
              $env:ASSETS_DIR,
              'assets-normalized',
              'generated',
              'out',
              'artifact'
          )

          foreach ($directory in $directories) {
              if (Test-Path -LiteralPath $directory) {
                  Write-Host "Removing: $directory"

                  Remove-Item `
                      -LiteralPath $directory `
                      -Recurse `
                      -Force
              }
          }

          New-Item `
              -ItemType Directory `
              -Path $env:PRIVATE_INPUT_DIR `
              -Force |
              Out-Null

      # ------------------------------------------------------------
      # 9. Download ISO
      # ------------------------------------------------------------

      - name: Download ISO
        run: |
          $ErrorActionPreference = 'Stop'

          curl.exe `
              --fail `
              --location `
              --retry 5 `
              --retry-all-errors `
              --retry-delay 10 `
              --connect-timeout 30 `
              --max-time 14400 `
              --output "$env:ISO_LOCAL_PATH" `
              "$env:RESOLVED_ISO_URL"

          if ($LASTEXITCODE -ne 0) {
              throw "ISO download failed with exit code $LASTEXITCODE."
          }

          if (-not (
              Test-Path `
                  -LiteralPath $env:ISO_LOCAL_PATH `
                  -PathType Leaf
          )) {
              throw "Downloaded ISO was not found."
          }

          $iso = Get-Item -LiteralPath $env:ISO_LOCAL_PATH

          if ($iso.Length -eq 0) {
              throw "Downloaded ISO is empty."
          }

          $sizeGiB = [Math]::Round(
              $iso.Length / 1GB,
              3
          )

          Write-Host "Downloaded ISO size: $sizeGiB GiB"

      # ------------------------------------------------------------
      # 10. Verify ISO SHA-256
      # ------------------------------------------------------------

      - name: Verify ISO SHA-256
        run: |
          $ErrorActionPreference = 'Stop'

          $expected = (
              $env:EXPECTED_ISO_SHA256 -replace '\s', ''
          ).ToUpperInvariant()

          $actual = (
              Get-FileHash `
                  -LiteralPath $env:ISO_LOCAL_PATH `
                  -Algorithm SHA256
          ).Hash.ToUpperInvariant()

          Write-Host "Expected SHA-256: $expected"
          Write-Host "Actual SHA-256  : $actual"

          if ($actual -ne $expected) {
              throw "ISO SHA-256 verification failed."
          }

      # ------------------------------------------------------------
      # 11. Inspect and extract XDVDFS ISO
      # ------------------------------------------------------------

      - name: Inspect ISO
        run: |
          $ErrorActionPreference = 'Stop'

          xdvdfs info "$env:ISO_LOCAL_PATH"

          if ($LASTEXITCODE -ne 0) {
              throw "The downloaded file is not a readable XDVDFS image."
          }

          Write-Host "ISO root directory:"
          xdvdfs ls "$env:ISO_LOCAL_PATH"

          if ($LASTEXITCODE -ne 0) {
              throw "Unable to read the ISO root directory."
          }

      - name: Extract ISO to assets
        run: |
          $ErrorActionPreference = 'Stop'

          New-Item `
              -ItemType Directory `
              -Path $env:ASSETS_DIR `
              -Force |
              Out-Null

          xdvdfs unpack `
              "$env:ISO_LOCAL_PATH" `
              "$env:ASSETS_DIR"

          if ($LASTEXITCODE -ne 0) {
              throw "xdvdfs unpack failed."
          }

      # ------------------------------------------------------------
      # 12. Normalize extracted game directory
      # ------------------------------------------------------------

      - name: Normalize assets directory
        run: |
          $ErrorActionPreference = 'Stop'

          $expectedXex = Join-Path `
              $PWD `
              'assets/default.xex'

          if (
              Test-Path `
                  -LiteralPath $expectedXex `
                  -PathType Leaf
          ) {
              Write-Host "default.xex found at assets/default.xex"
              exit 0
          }

          $matches = @(
              Get-ChildItem `
                  -LiteralPath $env:ASSETS_DIR `
                  -Recurse `
                  -File `
                  -Filter 'default.xex'
          )

          if ($matches.Count -eq 0) {
              throw "No default.xex was found in the extracted ISO."
          }

          if ($matches.Count -gt 1) {
              Write-Host "Multiple default.xex files were found:"

              $matches |
                  Select-Object FullName, Length |
                  Format-Table -AutoSize

              throw "Unable to determine the correct game root."
          }

          $gameRoot = $matches[0].Directory.FullName
          $normalizedDirectory = Join-Path `
              $PWD `
              'assets-normalized'

          if (Test-Path -LiteralPath $normalizedDirectory) {
              Remove-Item `
                  -LiteralPath $normalizedDirectory `
                  -Recurse `
                  -Force
          }

          New-Item `
              -ItemType Directory `
              -Path $normalizedDirectory `
              -Force |
              Out-Null

          Get-ChildItem `
              -LiteralPath $gameRoot `
              -Force |
              ForEach-Object {
                  Copy-Item `
                      -LiteralPath $_.FullName `
                      -Destination $normalizedDirectory `
                      -Recurse `
                      -Force
              }

          Remove-Item `
              -LiteralPath $env:ASSETS_DIR `
              -Recurse `
              -Force

          Move-Item `
              -LiteralPath $normalizedDirectory `
              -Destination $env:ASSETS_DIR

          if (-not (
              Test-Path `
                  -LiteralPath 'assets/default.xex' `
                  -PathType Leaf
          )) {
              throw "Failed to normalize the assets directory."
          }

          Write-Host "Game root normalized to assets/."

      - name: Verify extracted assets
        run: |
          $ErrorActionPreference = 'Stop'

          if (-not (
              Test-Path `
                  -LiteralPath 'assets/default.xex' `
                  -PathType Leaf
          )) {
              throw "assets/default.xex is missing."
          }

          $defaultXex = Get-Item `
              -LiteralPath 'assets/default.xex'

          if ($defaultXex.Length -eq 0) {
              throw "assets/default.xex is empty."
          }

          $files = @(
              Get-ChildItem `
                  -LiteralPath assets `
                  -Recurse `
                  -File
          )

          $fileCount = $files.Count

          $totalBytes = (
              $files |
              Measure-Object `
                  -Property Length `
                  -Sum
          ).Sum

          $totalGiB = [Math]::Round(
              $totalBytes / 1GB,
              3
          )

          Write-Host "default.xex size : $($defaultXex.Length) bytes"
          Write-Host "Extracted files  : $fileCount"
          Write-Host "Extracted size   : $totalGiB GiB"

      # ------------------------------------------------------------
      # 13. Delete ISO after extraction
      # ------------------------------------------------------------

      - name: Remove downloaded ISO
        run: |
          $ErrorActionPreference = 'Stop'

          Remove-Item `
              -LiteralPath $env:ISO_LOCAL_PATH `
              -Force

          if (Test-Path -LiteralPath $env:PRIVATE_INPUT_DIR) {
              Remove-Item `
                  -LiteralPath $env:PRIVATE_INPUT_DIR `
                  -Recurse `
                  -Force
          }

          Write-Host "Downloaded ISO removed."

      # ------------------------------------------------------------
      # 14. Initial CMake configuration
      # ------------------------------------------------------------

      - name: Initial CMake configure
        run: |
          $ErrorActionPreference = 'Stop'

          cmake --preset "$env:CMAKE_PRESET"

          if ($LASTEXITCODE -ne 0) {
              throw "Initial CMake configuration failed."
          }

      # ------------------------------------------------------------
      # 15. Generate recompiled sources
      # ------------------------------------------------------------

      - name: Generate recompiled sources
        run: |
          $ErrorActionPreference = 'Stop'

          cmake `
              --build `
              --preset "$env:CMAKE_PRESET" `
              --target ac6recomp_codegen `
              --parallel

          if ($LASTEXITCODE -ne 0) {
              throw "AC6Recomp code generation failed."
          }

          if (-not (
              Test-Path `
                  -LiteralPath 'generated/sources.cmake' `
                  -PathType Leaf
          )) {
              throw "generated/sources.cmake was not created."
          }

          $generatedCppCount = (
              Get-ChildItem `
                  -LiteralPath generated `
                  -Recurse `
                  -File `
                  -Filter '*.cpp' |
              Measure-Object
          ).Count

          Write-Host "Generated C++ files: $generatedCppCount"

      # ------------------------------------------------------------
      # 16. Reconfigure after code generation
      # ------------------------------------------------------------

      - name: Reconfigure CMake
        run: |
          $ErrorActionPreference = 'Stop'

          cmake --preset "$env:CMAKE_PRESET"

          if ($LASTEXITCODE -ne 0) {
              throw "CMake reconfiguration failed."
          }

      # ------------------------------------------------------------
      # 17. Build final executable
      # ------------------------------------------------------------

      - name: Build AC6Recomp
        run: |
          $ErrorActionPreference = 'Stop'

          cmake `
              --build `
              --preset "$env:CMAKE_PRESET" `
              --parallel

          if ($LASTEXITCODE -ne 0) {
              throw "AC6Recomp compilation failed."
          }

          Write-Host "--- sccache stats ---"
          sccache --show-stats

      # ------------------------------------------------------------
      # 18. Prepare artifact
      # ------------------------------------------------------------

      - name: Prepare artifact
        run: |
          $ErrorActionPreference = 'Stop'

          $executable = Join-Path `
              $PWD `
              "out/build/$env:CMAKE_PRESET/ac6recomp.exe"

          if (-not (
              Test-Path `
                  -LiteralPath $executable `
                  -PathType Leaf
          )) {
              throw "Executable was not found: $executable"
          }

          New-Item `
              -ItemType Directory `
              -Path $env:ARTIFACT_DIR `
              -Force |
              Out-Null

          Copy-Item `
              -LiteralPath $executable `
              -Destination "$env:ARTIFACT_DIR/ac6recomp.exe" `
              -Force

          $hash = (
              Get-FileHash `
                  -LiteralPath "$env:ARTIFACT_DIR/ac6recomp.exe" `
                  -Algorithm SHA256
          ).Hash.ToLowerInvariant()

          "$hash  ac6recomp.exe" |
              Set-Content `
                  -LiteralPath "$env:ARTIFACT_DIR/ac6recomp.exe.sha256" `
                  -Encoding ascii

          $artifactExecutable = Get-Item `
              -LiteralPath "$env:ARTIFACT_DIR/ac6recomp.exe"

          Write-Host "Executable size  : $($artifactExecutable.Length) bytes"
          Write-Host "Executable hash  : $hash"

      # ------------------------------------------------------------
      # 19. Remove private files before artifact upload
      # ------------------------------------------------------------

      - name: Remove private build inputs
        if: always()
        run: |
          $ErrorActionPreference = 'Continue'

          $sensitiveDirectories = @(
              $env:PRIVATE_INPUT_DIR,
              $env:ASSETS_DIR,
              'assets-normalized',
              'generated'
          )

          foreach ($directory in $sensitiveDirectories) {
              if (Test-Path -LiteralPath $directory) {
                  Write-Host "Removing sensitive directory: $directory"

                  Remove-Item `
                      -LiteralPath $directory `
                      -Recurse `
                      -Force `
                      -ErrorAction Continue
              }
          }

      # ------------------------------------------------------------
      # 20. Upload final executable
      # ------------------------------------------------------------

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AC6Recomp-win-amd64-relwithdebinfo-${{ github.sha }}
          path: artifact/AC6Recomp/
          if-no-files-found: error
          compression-level: 9
          retention-days: 14
